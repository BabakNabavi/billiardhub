<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 540" preserveAspectRatio="xMidYMid slice" role="img" aria-label="میز بیلیارد">
  <defs>
    <linearGradient id="b3bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a6d3f"/><stop offset="100%" stop-color="#0e401f"/>
    </linearGradient>
    <radialGradient id="b3light" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b3ballW" cx="34%" cy="30%" r="72%"><stop offset="0%" stop-color="#fff"/><stop offset="60%" stop-color="#ece7da"/><stop offset="100%" stop-color="#b4ae9d"/></radialGradient>
    <radialGradient id="b3ballR" cx="34%" cy="30%" r="72%"><stop offset="0%" stop-color="#ff8374"/><stop offset="45%" stop-color="#d21f1f"/><stop offset="100%" stop-color="#7a0c0c"/></radialGradient>
  </defs>

  <rect width="1600" height="540" fill="url(#b3bg)"/>
  <rect width="1600" height="540" fill="url(#b3light)"/>

  <!-- table rail with cushion + pockets -->
  <rect x="70" y="70" width="1460" height="400" rx="34" fill="none" stroke="#0a3018" stroke-width="26"/>
  <rect x="70" y="70" width="1460" height="400" rx="34" fill="none" stroke="#C7A66A" stroke-opacity="0.35" stroke-width="2"/>
  <!-- pockets -->
  <g fill="#08260f">
    <circle cx="70"  cy="70"  r="30"/><circle cx="800" cy="60" r="26"/><circle cx="1530" cy="70" r="30"/>
    <circle cx="70"  cy="470" r="30"/><circle cx="800" cy="480" r="26"/><circle cx="1530" cy="470" r="30"/>
  </g>
  <!-- rail diamonds -->
  <g fill="#C7A66A" opacity="0.85">
    <circle cx="290" cy="52" r="6"/><circle cx="510" cy="52" r="6"/><circle cx="1090" cy="52" r="6"/><circle cx="1310" cy="52" r="6"/>
    <circle cx="290" cy="488" r="6"/><circle cx="510" cy="488" r="6"/><circle cx="1090" cy="488" r="6"/><circle cx="1310" cy="488" r="6"/>
  </g>

  <!-- break: cue ball approaching a red -->
  <circle cx="470" cy="300" r="30" fill="url(#b3ballW)"/>
  <circle cx="720" cy="270" r="30" fill="url(#b3ballR)"/>
  <line x1="150" y1="330" x2="440" y2="308" stroke="#e9cf95" stroke-width="12" stroke-linecap="round" opacity="0.9"/>

  <g transform="translate(900 230)" fill="#ffffff">
    <text x="0" y="0" font-family="Vazirmatn, Tahoma, sans-serif" font-size="58" font-weight="800">میز و تجهیزات کلاب</text>
    <text x="4" y="48" font-family="Georgia, serif" font-size="23" letter-spacing="8" fill="#C7A66A" opacity="0.9">TABLES · CLUB GEAR</text>
  </g>
</svg>
