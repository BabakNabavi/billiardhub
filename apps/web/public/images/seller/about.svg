<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="درباره ما">
  <defs>
    <radialGradient id="abg" cx="42%" cy="26%" r="90%">
      <stop offset="0%" stop-color="#1E6B3C"/><stop offset="55%" stop-color="#134a29"/><stop offset="100%" stop-color="#0a2f1a"/>
    </radialGradient>
    <radialGradient id="aSpot" cx="42%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.24"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="aCue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3ead0"/><stop offset="30%" stop-color="#c99a52"/>
      <stop offset="70%" stop-color="#7d5626"/><stop offset="100%" stop-color="#40290f"/>
    </linearGradient>
    <radialGradient id="aBall" cx="34%" cy="30%" r="72%"><stop offset="0%" stop-color="#ffe493"/><stop offset="45%" stop-color="#f0ac0a"/><stop offset="100%" stop-color="#8f6500"/></radialGradient>
  </defs>

  <rect width="900" height="1000" fill="url(#abg)"/>
  <rect width="900" height="1000" fill="url(#aSpot)"/>

  <!-- standing cue -->
  <g transform="rotate(9 470 500)">
    <rect x="452" y="150" width="26" height="740" rx="13" fill="url(#aCue)"/>
    <rect x="452" y="150" width="26" height="120" rx="13" fill="#f5efe0"/>
    <circle cx="465" cy="158" r="15" fill="#1f5fb0"/>
  </g>

  <!-- chalk cube -->
  <g transform="translate(250 720)">
    <rect x="0" y="0" width="120" height="110" rx="10" fill="#1f5fb0"/>
    <rect x="18" y="16" width="84" height="70" rx="6" fill="#2f74cf"/>
    <circle cx="60" cy="52" r="22" fill="#1a4f9c"/>
  </g>

  <!-- ball -->
  <circle cx="610" cy="810" r="66" fill="url(#aBall)"/>
  <circle cx="588" cy="784" r="12" fill="#fff" opacity="0.55"/>

  <!-- gold frame + wordmark -->
  <rect x="26" y="26" width="848" height="948" rx="22" fill="none" stroke="#C7A66A" stroke-opacity="0.5" stroke-width="2"/>
  <g transform="translate(70 130)" fill="#ffffff">
    <text x="0" y="0" font-family="Vazirmatn, Tahoma, sans-serif" font-size="76" font-weight="800">درباره ما</text>
    <text x="4" y="52" font-family="Georgia, serif" font-size="27" letter-spacing="9" fill="#C7A66A" opacity="0.9">ABOUT THE SHOP</text>
  </g>
</svg>
