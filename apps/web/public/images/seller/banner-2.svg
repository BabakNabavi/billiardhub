<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 540" preserveAspectRatio="xMidYMid slice" role="img" aria-label="چوب و توپ بیلیارد">
  <defs>
    <linearGradient id="b2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14231b"/>
      <stop offset="52%" stop-color="#123a25"/>
      <stop offset="100%" stop-color="#0a1c13"/>
    </linearGradient>
    <linearGradient id="cueA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e9cf95"/><stop offset="45%" stop-color="#b98b42"/>
      <stop offset="70%" stop-color="#6d4a1e"/><stop offset="100%" stop-color="#3a2610"/>
    </linearGradient>
    <radialGradient id="b2eight" cx="34%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#5a5a5a"/><stop offset="42%" stop-color="#171717"/><stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="b2spot" cx="72%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#C7A66A" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#C7A66A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="540" fill="url(#b2bg)"/>
  <rect width="1600" height="540" fill="url(#b2spot)"/>

  <!-- chalk dust -->
  <g fill="#C7A66A" opacity="0.5">
    <circle cx="420" cy="150" r="3"/><circle cx="520" cy="380" r="2.5"/><circle cx="900" cy="120" r="2"/>
    <circle cx="1180" cy="430" r="3"/><circle cx="1320" cy="180" r="2.5"/><circle cx="640" cy="470" r="2"/>
    <circle cx="1060" cy="360" r="2.5"/><circle cx="760" cy="90" r="2"/>
  </g>

  <!-- cue stick, long diagonal -->
  <g transform="rotate(-24 800 270)">
    <rect x="150" y="256" width="1300" height="20" rx="10" fill="url(#cueA)"/>
    <rect x="150" y="256" width="150" height="20" rx="10" fill="#f3f0e6"/>
    <circle cx="150" cy="266" r="12" fill="#1f5fb0"/>
  </g>

  <!-- 8 ball -->
  <g transform="translate(1200 330)">
    <circle r="86" fill="url(#b2eight)"/>
    <circle cx="-4" cy="-30" r="34" fill="#ffffff"/>
    <text x="-4" y="-16" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="700" fill="#111">8</text>
    <ellipse cx="-30" cy="-44" rx="16" ry="9" fill="#fff" opacity="0.5"/>
  </g>

  <rect x="26" y="26" width="1548" height="488" rx="20" fill="none" stroke="#C7A66A" stroke-opacity="0.5" stroke-width="2"/>

  <g transform="translate(96 250)" fill="#ffffff">
    <text x="0" y="0" font-family="Vazirmatn, Tahoma, sans-serif" font-size="60" font-weight="800">چوب، توپ و لوازم جانبی</text>
    <text x="4" y="50" font-family="Georgia, serif" font-size="24" letter-spacing="9" fill="#C7A66A" opacity="0.9">CUES · BALLS · ACCESSORIES</text>
  </g>
</svg>
